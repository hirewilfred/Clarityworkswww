  <!-- Structured Data -->
  <script type="application/ld+json">

          "@id": "https://clarityworksstudio.com/#organization",

          "logo": {
            "@type": "ImageObject",
            "url": "https://clarityworksstudio.com/logo.png"
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+1-905-304-1907",
            "contactType": "customer service",
            "areaServed": "Global",
            "availableLanguage": "en"
          },
          "sameAs": [
            "https://www.linkedin.com/company/clarityworksstudio"
          ]
        },
        {
          "@type": "LocalBusiness",
          "@id": "https://clarityworksstudio.com/#localbusiness",
          "name": "ClarityWorks Studio",
          "url": "https://clarityworksstudio.com",
          "telephone": "+1-905-304-1907",
          "areaServed": [
            { "@type": "City", "name": "Hamilton", "containedInPlace": { "@type": "AdministrativeArea", "name": "Ontario" } },
            { "@type": "City", "name": "Toronto", "containedInPlace": { "@type": "AdministrativeArea", "name": "Ontario" } }
          ],

        },
        {
          "@type": "WebSite",
          "@id": "https://clarityworksstudio.com/#website",

          "publisher": { "@id": "https://clarityworksstudio.com/#organization" }

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      background-color: #050614;
    }

    .bg-clarity-blue {
      background-color: #5c7cff;
    }

    .text-clarity-blue {
      color: #5c7cff;
    }

    /* Replaced Orange with Light Blue Accent */
    .bg-clarity-orange {
      background-color: #a5b4fc;
    }

    .text-clarity-orange {
      color: #a5b4fc;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .indigo-gradient {
      background: radial-gradient(circle at top right, #12143d 0%, #050614 100%);
    }

    .text-gradient {
      background: linear-gradient(to bottom right, #fff 30%, #a5b4fc 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @keyframes pulse-glow {

      0%,
      100% {
        opacity: 0.4;
        transform: scale(1);
      }

      50% {
        opacity: 0.7;
        transform: scale(1.05);
      }
    }

    .glow-sphere {
      filter: blur(60px);
      animation: pulse-glow 4s infinite ease-in-out;
    }

    @keyframes marquee {
      0% {
        transform: translateX(0%);
      }
      100% {
        transform: translateX(-50%);
      }
    }
    .animate-marquee {
      animation: marquee 20s linear infinite;
    }
    .animate-marquee:hover {
      animation-play-state: paused;
    }

    /* shadcn/ui CSS variables */
    :root {
      --card: #ffffff;
      --card-foreground: #0f172a;
      --muted-foreground: #64748b;
      --foreground: #0f172a;
      --accent: #5c7cff;
      --primary: #5c7cff;
      --muted: #f1f5f9;
    }
  </style>
</head>

<body class="text-white">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
