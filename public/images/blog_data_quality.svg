<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c1029"/>
      <stop offset="100%" stop-color="#050614"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="edge1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5c7cff" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="400" cy="380" rx="250" ry="250" fill="url(#glow1)"/>
  <!-- Grid -->
  <g stroke="#06b6d4" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="480" x2="800" y2="480"/><line x1="0" y1="640" x2="800" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/><line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/><line x1="640" y1="0" x2="640" y2="800"/>
  </g>
  <!-- Knowledge Graph: nodes and edges -->
  <!-- Central node -->
  <circle cx="400" cy="380" r="40" fill="#0f1640" stroke="#06b6d4" stroke-width="2.5" filter="url(#glow)"/>
  <text x="400" y="375" text-anchor="middle" fill="#06b6d4" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">SEMANTIC</text>
  <text x="400" y="393" text-anchor="middle" fill="#06b6d4" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">LAYER</text>
  <!-- Node: Data Source 1 -->
  <line x1="360" y1="350" x2="220" y2="220" stroke="url(#edge1)" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="30" fill="#0f1640" stroke="#5c7cff" stroke-width="2" filter="url(#glow)"/>
  <text x="200" y="197" text-anchor="middle" fill="#5c7cff" font-family="system-ui,sans-serif" font-size="10" font-weight="bold">CRM</text>
  <text x="200" y="211" text-anchor="middle" fill="#5c7cff" font-family="system-ui,sans-serif" font-size="9" opacity="0.7">DATA</text>
  <!-- Node: Data Source 2 -->
  <line x1="440" y1="350" x2="600" y2="220" stroke="url(#edge1)" stroke-width="1.5"/>
  <circle cx="620" cy="200" r="30" fill="#0f1640" stroke="#a855f7" stroke-width="2" filter="url(#glow)"/>
  <text x="620" y="197" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="10" font-weight="bold">API</text>
  <text x="620" y="211" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="9" opacity="0.7">FEEDS</text>
  <!-- Node: Data Source 3 -->
  <line x1="360" y1="400" x2="170" y2="500" stroke="url(#edge1)" stroke-width="1.5"/>
  <circle cx="150" cy="520" r="30" fill="#0f1640" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
  <text x="150" y="517" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="10" font-weight="bold">DOCS</text>
  <text x="150" y="531" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="9" opacity="0.7">PDF/TXT</text>
  <!-- Node: Data Source 4 -->
  <line x1="440" y1="410" x2="620" y2="530" stroke="url(#edge1)" stroke-width="1.5"/>
  <circle cx="640" cy="550" r="30" fill="#0f1640" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>
  <text x="640" y="547" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="10" font-weight="bold">SQL</text>
  <text x="640" y="561" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="9" opacity="0.7">TABLES</text>
  <!-- Cross-edges between sources -->
  <line x1="225" y1="215" x2="590" y2="210" stroke="#5c7cff" stroke-width="0.8" stroke-opacity="0.15" stroke-dasharray="4,6"/>
  <line x1="175" y1="500" x2="610" y2="535" stroke="#10b981" stroke-width="0.8" stroke-opacity="0.15" stroke-dasharray="4,6"/>
  <line x1="210" y1="228" x2="160" y2="492" stroke="#5c7cff" stroke-width="0.8" stroke-opacity="0.1" stroke-dasharray="4,6"/>
  <line x1="630" y1="228" x2="640" y2="520" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.1" stroke-dasharray="4,6"/>
  <!-- Output node -->
  <line x1="400" y1="420" x2="400" y2="620" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,4" stroke-opacity="0.5"/>
  <polygon points="394,616 400,630 406,616" fill="#06b6d4" opacity="0.6"/>
  <rect x="320" y="640" width="160" height="50" rx="12" fill="#0f1640" stroke="#06b6d4" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="671" text-anchor="middle" fill="#06b6d4" font-family="system-ui,sans-serif" font-size="14" font-weight="bold">AI AGENTS</text>
  <!-- Quality indicators floating -->
  <g opacity="0.6">
    <rect x="80" y="320" width="70" height="26" rx="6" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1"/>
    <text x="115" y="338" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="10" font-weight="bold">99.2%</text>
    <rect x="650" y="340" width="70" height="26" rx="6" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="685" y="358" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="10" font-weight="bold">87.4%</text>
    <rect x="300" y="260" width="70" height="26" rx="6" fill="#5c7cff" fill-opacity="0.15" stroke="#5c7cff" stroke-width="1"/>
    <text x="335" y="278" text-anchor="middle" fill="#5c7cff" font-family="system-ui,sans-serif" font-size="10" font-weight="bold">CLEAN</text>
  </g>
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="26" font-weight="900" letter-spacing="2" opacity="0.9">DATA QUALITY</text>
  <text x="400" y="92" text-anchor="middle" fill="#06b6d4" font-family="system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="4" opacity="0.7">KNOWLEDGE GRAPHS</text>
  <!-- Particles -->
  <circle cx="90" cy="130" r="2" fill="#06b6d4" opacity="0.4"/><circle cx="710" cy="120" r="2.5" fill="#a855f7" opacity="0.3"/>
  <circle cx="750" cy="700" r="2" fill="#5c7cff" opacity="0.4"/><circle cx="60" cy="700" r="1.5" fill="#10b981" opacity="0.3"/>
</svg>
