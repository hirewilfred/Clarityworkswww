<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c1029"/>
      <stop offset="100%" stop-color="#050614"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5c7cff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="400" cy="400" rx="280" ry="260" fill="url(#glow1)"/>
  <!-- Grid -->
  <g stroke="#10b981" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="480" x2="800" y2="480"/><line x1="0" y1="640" x2="800" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/><line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/><line x1="640" y1="0" x2="640" y2="800"/>
  </g>
  <!-- Revenue chart area -->
  <rect x="140" y="150" width="520" height="360" rx="16" fill="#0a0e2a" stroke="#10b981" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Chart grid lines -->
  <g stroke="#10b981" stroke-opacity="0.08" stroke-width="1">
    <line x1="180" y1="220" x2="620" y2="220"/><line x1="180" y1="290" x2="620" y2="290"/>
    <line x1="180" y1="360" x2="620" y2="360"/><line x1="180" y1="430" x2="620" y2="430"/>
  </g>
  <!-- Y-axis labels -->
  <text x="168" y="225" text-anchor="end" fill="#10b981" font-family="monospace" font-size="9" opacity="0.5">$40K</text>
  <text x="168" y="295" text-anchor="end" fill="#10b981" font-family="monospace" font-size="9" opacity="0.5">$30K</text>
  <text x="168" y="365" text-anchor="end" fill="#10b981" font-family="monospace" font-size="9" opacity="0.5">$20K</text>
  <text x="168" y="435" text-anchor="end" fill="#10b981" font-family="monospace" font-size="9" opacity="0.5">$10K</text>
  <!-- Revenue bars -->
  <rect x="210" y="380" width="36" height="100" rx="4" fill="url(#bar)" opacity="0.7"/>
  <rect x="270" y="340" width="36" height="140" rx="4" fill="url(#bar)" opacity="0.7"/>
  <rect x="330" y="300" width="36" height="180" rx="4" fill="url(#bar)" opacity="0.8"/>
  <rect x="390" y="260" width="36" height="220" rx="4" fill="url(#bar)" opacity="0.8"/>
  <rect x="450" y="230" width="36" height="250" rx="4" fill="url(#bar)" opacity="0.9"/>
  <rect x="510" y="190" width="36" height="290" rx="4" fill="url(#bar)" opacity="0.9"/>
  <rect x="570" y="170" width="36" height="310" rx="4" fill="url(#bar)" filter="url(#glow)"/>
  <!-- Growth trend line -->
  <polyline points="228,375 288,335 348,295 408,255 468,225 528,185 588,165" fill="none" stroke="#5c7cff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="588" cy="165" r="5" fill="#5c7cff" filter="url(#glow)"/>
  <!-- Month labels -->
  <g fill="#10b981" font-family="monospace" font-size="9" opacity="0.5" text-anchor="middle">
    <text x="228" y="500">JAN</text><text x="288" y="500">FEB</text><text x="348" y="500">MAR</text>
    <text x="408" y="500">APR</text><text x="468" y="500">MAY</text><text x="528" y="500">JUN</text>
    <text x="588" y="500">JUL</text>
  </g>
  <!-- Pricing model cards -->
  <g transform="translate(120, 550)">
    <rect width="160" height="70" rx="12" fill="#0f1640" stroke="#10b981" stroke-width="1.5" filter="url(#glow)"/>
    <text x="80" y="28" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">PER-TASK</text>
    <text x="80" y="48" text-anchor="middle" fill="white" font-family="monospace" font-size="16" font-weight="bold" opacity="0.8">$0.12</text>
    <text x="80" y="62" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="9" opacity="0.5">/execution</text>
  </g>
  <g transform="translate(320, 550)">
    <rect width="160" height="70" rx="12" fill="#0f1640" stroke="#5c7cff" stroke-width="1.5" filter="url(#glow)"/>
    <text x="80" y="28" text-anchor="middle" fill="#5c7cff" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">SUBSCRIPTION</text>
    <text x="80" y="48" text-anchor="middle" fill="white" font-family="monospace" font-size="16" font-weight="bold" opacity="0.8">$499</text>
    <text x="80" y="62" text-anchor="middle" fill="#5c7cff" font-family="monospace" font-size="9" opacity="0.5">/month</text>
  </g>
  <g transform="translate(520, 550)">
    <rect width="160" height="70" rx="12" fill="#0f1640" stroke="#a855f7" stroke-width="1.5" filter="url(#glow)"/>
    <text x="80" y="28" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">REVENUE SHARE</text>
    <text x="80" y="48" text-anchor="middle" fill="white" font-family="monospace" font-size="16" font-weight="bold" opacity="0.8">15%</text>
    <text x="80" y="62" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="9" opacity="0.5">/outcome</text>
  </g>
  <!-- MRR callout -->
  <rect x="520" y="120" width="130" height="40" rx="8" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1" filter="url(#glow)"/>
  <text x="585" y="136" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="9" font-weight="bold">MRR</text>
  <text x="585" y="152" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">$47,200</text>
  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="26" font-weight="900" letter-spacing="2" opacity="0.9">MONETIZE</text>
  <text x="400" y="87" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="18" font-weight="700" letter-spacing="4" opacity="0.7">AI AGENTS</text>
  <!-- Particles -->
  <circle cx="70" cy="120" r="2" fill="#10b981" opacity="0.4"/><circle cx="730" cy="90" r="2" fill="#5c7cff" opacity="0.3"/>
  <circle cx="60" cy="750" r="1.5" fill="#a855f7" opacity="0.3"/><circle cx="740" cy="680" r="2" fill="#10b981" opacity="0.4"/>
</svg>
