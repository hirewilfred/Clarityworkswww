<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c1029"/>
      <stop offset="100%" stop-color="#050614"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="400" cy="370" rx="260" ry="250" fill="url(#glow1)"/>
  <!-- Grid -->
  <g stroke="#f59e0b" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="480" x2="800" y2="480"/><line x1="0" y1="640" x2="800" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/><line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/><line x1="640" y1="0" x2="640" y2="800"/>
  </g>
  <!-- Shield shape (governance/oversight) -->
  <path d="M400,160 L540,220 L540,400 Q540,520 400,580 Q260,520 260,400 L260,220 Z" fill="#0f1640" stroke="#f59e0b" stroke-width="2.5" filter="url(#glow)" fill-opacity="0.6"/>
  <path d="M400,180 L520,232 L520,390 Q520,498 400,554 Q280,498 280,390 L280,232 Z" fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Human eye icon at center of shield -->
  <ellipse cx="400" cy="340" rx="60" ry="35" fill="none" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>
  <circle cx="400" cy="340" r="16" fill="#0f1640" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="400" cy="340" r="7" fill="#f59e0b" fill-opacity="0.6"/>
  <text x="400" y="405" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" letter-spacing="3" opacity="0.8">OVERSIGHT</text>
  <!-- Agent nodes orbiting outside shield -->
  <!-- Top left agent -->
  <line x1="290" y1="240" x2="180" y2="180" stroke="#5c7cff" stroke-width="1.5" stroke-dasharray="4,4" stroke-opacity="0.4"/>
  <circle cx="160" cy="165" r="24" fill="#0f1640" stroke="#5c7cff" stroke-width="1.5" filter="url(#glow)"/>
  <text x="160" y="162" text-anchor="middle" fill="#5c7cff" font-family="system-ui,sans-serif" font-size="8" font-weight="bold">AGENT</text>
  <text x="160" y="174" text-anchor="middle" fill="#5c7cff" font-family="system-ui,sans-serif" font-size="8" font-weight="bold">ALPHA</text>
  <!-- Top right agent -->
  <line x1="510" y1="240" x2="620" y2="180" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,4" stroke-opacity="0.4"/>
  <circle cx="640" cy="165" r="24" fill="#0f1640" stroke="#a855f7" stroke-width="1.5" filter="url(#glow)"/>
  <text x="640" y="162" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="8" font-weight="bold">AGENT</text>
  <text x="640" y="174" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="8" font-weight="bold">BETA</text>
  <!-- Left agent -->
  <line x1="260" y1="400" x2="130" y2="410" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,4" stroke-opacity="0.4"/>
  <circle cx="110" cy="410" r="24" fill="#0f1640" stroke="#06b6d4" stroke-width="1.5" filter="url(#glow)"/>
  <text x="110" y="407" text-anchor="middle" fill="#06b6d4" font-family="system-ui,sans-serif" font-size="8" font-weight="bold">AGENT</text>
  <text x="110" y="419" text-anchor="middle" fill="#06b6d4" font-family="system-ui,sans-serif" font-size="8" font-weight="bold">GAMMA</text>
  <!-- Right agent -->
  <line x1="540" y1="400" x2="670" y2="410" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,4" stroke-opacity="0.4"/>
  <circle cx="690" cy="410" r="24" fill="#0f1640" stroke="#10b981" stroke-width="1.5" filter="url(#glow)"/>
  <text x="690" y="407" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="8" font-weight="bold">AGENT</text>
  <text x="690" y="419" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="8" font-weight="bold">DELTA</text>
  <!-- Policy rules at bottom -->
  <g transform="translate(180, 620)">
    <rect width="440" height="100" rx="14" fill="#0f1640" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
    <text x="220" y="28" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="bold" opacity="0.7">GOVERNANCE POLICIES</text>
    <line x1="40" y1="42" x2="400" y2="42" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="30" y="60" fill="#10b981" font-family="monospace" font-size="10" opacity="0.6">&#x2713; Data access scoped per role</text>
    <text x="30" y="78" fill="#10b981" font-family="monospace" font-size="10" opacity="0.6">&#x2713; Human approval for $&gt;10K actions</text>
    <text x="30" y="96" fill="#f59e0b" font-family="monospace" font-size="10" opacity="0.6">&#x26A0; External API calls require audit log</text>
  </g>
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="26" font-weight="900" letter-spacing="2" opacity="0.9">AI AGENT</text>
  <text x="400" y="92" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="18" font-weight="700" letter-spacing="4" opacity="0.7">GOVERNANCE</text>
  <!-- Particles -->
  <circle cx="80" cy="600" r="2" fill="#f59e0b" opacity="0.4"/><circle cx="720" cy="280" r="2" fill="#5c7cff" opacity="0.3"/>
  <circle cx="720" cy="600" r="1.5" fill="#a855f7" opacity="0.4"/><circle cx="80" cy="280" r="2" fill="#06b6d4" opacity="0.3"/>
</svg>
