<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c1029"/>
      <stop offset="100%" stop-color="#050614"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#76b900" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#76b900" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gpu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#76b900" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5c7cff" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="400" cy="380" rx="280" ry="250" fill="url(#glow1)"/>
  <!-- Grid -->
  <g stroke="#76b900" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="480" x2="800" y2="480"/><line x1="0" y1="640" x2="800" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/><line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/><line x1="640" y1="0" x2="640" y2="800"/>
  </g>
  <!-- GPU chip array (3x3 grid) -->
  <g filter="url(#glow)">
    <!-- Row 1 -->
    <rect x="230" y="220" width="90" height="70" rx="8" fill="#0f1640" stroke="#76b900" stroke-width="2"/>
    <rect x="355" y="220" width="90" height="70" rx="8" fill="#0f1640" stroke="#76b900" stroke-width="2"/>
    <rect x="480" y="220" width="90" height="70" rx="8" fill="#0f1640" stroke="#76b900" stroke-width="2"/>
    <!-- Row 2 -->
    <rect x="230" y="320" width="90" height="70" rx="8" fill="#0f1640" stroke="#76b900" stroke-width="2"/>
    <rect x="355" y="320" width="90" height="70" rx="8" fill="#0f1640" stroke="#5c7cff" stroke-width="2.5"/>
    <rect x="480" y="320" width="90" height="70" rx="8" fill="#0f1640" stroke="#76b900" stroke-width="2"/>
    <!-- Row 3 -->
    <rect x="230" y="420" width="90" height="70" rx="8" fill="#0f1640" stroke="#76b900" stroke-width="2"/>
    <rect x="355" y="420" width="90" height="70" rx="8" fill="#0f1640" stroke="#76b900" stroke-width="2"/>
    <rect x="480" y="420" width="90" height="70" rx="8" fill="#0f1640" stroke="#76b900" stroke-width="2"/>
  </g>
  <!-- GPU labels -->
  <text x="275" y="260" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="11" font-weight="bold">H100</text>
  <text x="400" y="260" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="11" font-weight="bold">H100</text>
  <text x="525" y="260" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="11" font-weight="bold">H100</text>
  <text x="275" y="360" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="11" font-weight="bold">H100</text>
  <text x="400" y="355" text-anchor="middle" fill="#5c7cff" font-family="monospace" font-size="10" font-weight="bold">AGENT</text>
  <text x="400" y="370" text-anchor="middle" fill="#5c7cff" font-family="monospace" font-size="10" font-weight="bold">CORE</text>
  <text x="525" y="360" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="11" font-weight="bold">H100</text>
  <text x="275" y="460" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="11" font-weight="bold">H100</text>
  <text x="400" y="460" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="11" font-weight="bold">H100</text>
  <text x="525" y="460" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="11" font-weight="bold">H100</text>
  <!-- NVLink connections between chips -->
  <g stroke="#76b900" stroke-width="1" stroke-opacity="0.3">
    <line x1="320" y1="255" x2="355" y2="255"/><line x1="445" y1="255" x2="480" y2="255"/>
    <line x1="320" y1="355" x2="355" y2="355"/><line x1="445" y1="355" x2="480" y2="355"/>
    <line x1="320" y1="455" x2="355" y2="455"/><line x1="445" y1="455" x2="480" y2="455"/>
    <line x1="275" y1="290" x2="275" y2="320"/><line x1="400" y1="290" x2="400" y2="320"/>
    <line x1="525" y1="290" x2="525" y2="320"/><line x1="275" y1="390" x2="275" y2="420"/>
    <line x1="400" y1="390" x2="400" y2="420"/><line x1="525" y1="390" x2="525" y2="420"/>
  </g>
  <!-- Output: Agents flowing out -->
  <line x1="400" y1="490" x2="400" y2="560" stroke="url(#gpu)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="300" y1="490" x2="250" y2="560" stroke="url(#gpu)" stroke-width="1.5" stroke-dasharray="5,5" stroke-opacity="0.5"/>
  <line x1="500" y1="490" x2="550" y2="560" stroke="url(#gpu)" stroke-width="1.5" stroke-dasharray="5,5" stroke-opacity="0.5"/>
  <!-- Agent icons -->
  <circle cx="250" cy="590" r="22" fill="#0f1640" stroke="#a855f7" stroke-width="1.5" filter="url(#glow)"/>
  <text x="250" y="595" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="9" font-weight="bold">AGT 1</text>
  <circle cx="400" cy="590" r="22" fill="#0f1640" stroke="#5c7cff" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="595" text-anchor="middle" fill="#5c7cff" font-family="system-ui,sans-serif" font-size="9" font-weight="bold">AGT 2</text>
  <circle cx="550" cy="590" r="22" fill="#0f1640" stroke="#06b6d4" stroke-width="1.5" filter="url(#glow)"/>
  <text x="550" y="595" text-anchor="middle" fill="#06b6d4" font-family="system-ui,sans-serif" font-size="9" font-weight="bold">AGT 3</text>
  <!-- Performance bar -->
  <rect x="200" y="660" width="400" height="8" rx="4" fill="#1a1f4a" stroke="#76b900" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="200" y="660" width="340" height="8" rx="4" fill="#76b900" fill-opacity="0.6"/>
  <text x="400" y="695" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="11" font-weight="bold" opacity="0.6">THROUGHPUT: 85% UTILIZATION</text>
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="26" font-weight="900" letter-spacing="2" opacity="0.9">NVIDIA &amp; THE</text>
  <text x="400" y="92" text-anchor="middle" fill="#76b900" font-family="system-ui,sans-serif" font-size="18" font-weight="700" letter-spacing="4" opacity="0.7">AGENT ECONOMY</text>
  <!-- Outer frame accent -->
  <rect x="180" y="170" width="440" height="360" rx="16" fill="none" stroke="#76b900" stroke-width="1" stroke-opacity="0.1"/>
  <!-- Particles -->
  <circle cx="100" cy="150" r="2" fill="#76b900" opacity="0.4"/><circle cx="700" cy="130" r="2.5" fill="#5c7cff" opacity="0.3"/>
  <circle cx="720" cy="720" r="2" fill="#76b900" opacity="0.4"/><circle cx="80" cy="680" r="1.5" fill="#a855f7" opacity="0.3"/>
</svg>
