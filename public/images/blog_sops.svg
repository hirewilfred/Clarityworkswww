<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c1029"/>
      <stop offset="100%" stop-color="#050614"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#5c7cff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5c7cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c7cff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="line2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5c7cff" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="400" cy="350" rx="300" ry="300" fill="url(#glow1)"/>
  <!-- Grid lines -->
  <g stroke="#5c7cff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/><line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="700" x2="800" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/><line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/><line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
  </g>
  <!-- SOP Flow: vertical steps connected by lines -->
  <!-- Step 1 -->
  <rect x="300" y="120" width="200" height="60" rx="12" fill="#0f1640" stroke="#5c7cff" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="157" text-anchor="middle" fill="#5c7cff" font-family="system-ui,sans-serif" font-size="16" font-weight="bold">STEP 1: TRIGGER</text>
  <!-- Connector -->
  <line x1="400" y1="180" x2="400" y2="240" stroke="url(#line1)" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="394,236 400,248 406,236" fill="#5c7cff" opacity="0.8"/>
  <!-- Step 2 -->
  <rect x="300" y="250" width="200" height="60" rx="12" fill="#0f1640" stroke="#a855f7" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="287" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="16" font-weight="bold">STEP 2: VALIDATE</text>
  <!-- Connector -->
  <line x1="400" y1="310" x2="400" y2="370" stroke="url(#line1)" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="394,366 400,378 406,366" fill="#a855f7" opacity="0.8"/>
  <!-- Step 3 — Decision diamond -->
  <polygon points="400,380 470,430 400,480 330,430" fill="#0f1640" stroke="#06b6d4" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="435" text-anchor="middle" fill="#06b6d4" font-family="system-ui,sans-serif" font-size="14" font-weight="bold">DECIDE</text>
  <!-- Branch left -->
  <line x1="330" y1="430" x2="200" y2="430" stroke="url(#line2)" stroke-width="2"/>
  <rect x="120" y="405" width="80" height="50" rx="8" fill="#0f1640" stroke="#10b981" stroke-width="1.5"/>
  <text x="160" y="435" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="12" font-weight="bold">HUMAN</text>
  <!-- Branch right -->
  <line x1="470" y1="430" x2="600" y2="430" stroke="url(#line2)" stroke-width="2"/>
  <rect x="600" y="405" width="80" height="50" rx="8" fill="#0f1640" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="640" y="435" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="12" font-weight="bold">AGENT</text>
  <!-- Converge -->
  <line x1="160" y1="455" x2="160" y2="540" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="640" y1="455" x2="640" y2="540" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="160" y1="540" x2="640" y2="540" stroke="url(#line1)" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="400" y1="480" x2="400" y2="540" stroke="url(#line1)" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Step 4 -->
  <rect x="300" y="550" width="200" height="60" rx="12" fill="#0f1640" stroke="#5c7cff" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="587" text-anchor="middle" fill="#5c7cff" font-family="system-ui,sans-serif" font-size="16" font-weight="bold">STEP 4: EXECUTE</text>
  <!-- Connector -->
  <line x1="400" y1="610" x2="400" y2="660" stroke="url(#line1)" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="394,656 400,668 406,656" fill="#5c7cff" opacity="0.8"/>
  <!-- Step 5 -->
  <rect x="300" y="670" width="200" height="60" rx="12" fill="#0f1640" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="707" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="16" font-weight="bold">STEP 5: LOG</text>
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="28" font-weight="900" letter-spacing="2" opacity="0.9">AGENTIC PROCESS</text>
  <text x="400" y="92" text-anchor="middle" fill="#5c7cff" font-family="system-ui,sans-serif" font-size="18" font-weight="700" letter-spacing="4" opacity="0.7">AUTOMATION</text>
  <!-- Decorative particles -->
  <circle cx="120" cy="150" r="2" fill="#5c7cff" opacity="0.5"/><circle cx="680" cy="200" r="3" fill="#a855f7" opacity="0.4"/>
  <circle cx="700" cy="600" r="2" fill="#06b6d4" opacity="0.5"/><circle cx="100" cy="650" r="2.5" fill="#5c7cff" opacity="0.3"/>
  <circle cx="250" cy="750" r="1.5" fill="#a855f7" opacity="0.4"/><circle cx="550" cy="100" r="2" fill="#06b6d4" opacity="0.3"/>
</svg>
